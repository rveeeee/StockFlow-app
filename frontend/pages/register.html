<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../css/reset.css" />
    <link rel="stylesheet" href="../css/variables.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <link rel="stylesheet" href="../css/responsive.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Register</title>
  </head>
  <body>
    <div class="auth-wrapper">
      <div class="register-logo register-logo-green">
        <svg
          version="1.1"
          id="Layer_1"
          xmlns="http://www.w3.org/2000/svg"
          xmlns:xlink="http://www.w3.org/1999/xlink"
          viewBox="0 0 24 24"
          xml:space="preserve"
          width="24px"
          height="24px"
          fill="#000000"
        >
          <g id="SVGRepo_iconCarrier">
            <style type="text/css">
              .st6 {
                fill: #f2bb41;
                stroke: #f2bb41;
                stroke-width: 1;
                stroke-linecap: round;
                stroke-linejoin: round;
              }
              .st7 {
                fill: #e08838;
                stroke: #e08838;
                stroke-width: 1;
                stroke-linecap: round;
                stroke-linejoin: round;
              }
            </style>
            <path
              class="st6"
              d="M17,2H6C4.9,2,4,2.9,4,4v16c0,1.1,0.9,2,2,2h12c1.1,0,2-0.9,2-2V7L17,2z"
            ></path>
            <polygon class="st7" points="17,2 17,7 22,7"></polygon>
          </g>
        </svg>
      </div>
      <div class="header-text">
        <h1>Create your account</h1>
        <p>Start managing inventory for free</p>
      </div>
      <form action="" method="post" id="create-user">
        <div class="auth-input name-container">
          <div>
            <label for="fName">First Name</label>
            <input
              type="text"
              id="first-name"
              name="first-name"
              placeholder="Juan"
            />
          </div>
          <div>
            <label for="lName">Last Name</label>
            <input
              type="text"
              id="last-name"
              name="last-name"
              placeholder="Dela Cruz"
            />
          </div>
        </div>
        <div class="auth-input">
          <label for="email">Email address</label><br />
          <input
            type="email"
            id="email"
            name="email"
            placeholder="your_email@.com"
          /><br />
        </div>
        <div class="auth-input">
          <label for="password">Password</label>
          <div class="password-container">
            <input
              type="password"
              id="password"
              name="password"
              minlength="8"
              autocomplete="current-password"
              placeholder="Min. 8 characters"
            />
            <button
              type="button"
              id="toggle-password"
              aria-label="Toggle password visibility"
            >
              Show
            </button>
          </div>
          <p class="input-hint hint-left">
            By creating an account, you agree to our
            <span>Terms and Privacy Policy</span>
          </p>
        </div>
        <button type="submit" class="btn-create-account btn-create-green">
          Create Account
        </button>
      </form>
      <div class="create-account">
        <p>
          Already have an account?
          <a href="../pages/index.html">Sign In</a>
        </p>
      </div>
    </div>
    <script src="../js/auth.js"></script>
  </body>
</html>
